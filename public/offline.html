<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#18181b" />
    <title>Offline — Prestige Drinks</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          "Apple Color Emoji",
          "Segoe UI Emoji";
        background: #0a0a0a;
        color: #fafafa;
      }
      .wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(520px, 100%);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 16px;
        padding: 20px 18px;
        background: rgba(255, 255, 255, 0.04);
        backdrop-filter: blur(6px);
      }
      h1 {
        font-size: 18px;
        margin: 0 0 8px 0;
        font-weight: 650;
        letter-spacing: 0.2px;
      }
      p {
        margin: 0;
        line-height: 1.45;
        color: rgba(250, 250, 250, 0.84);
      }
      .hint {
        margin-top: 12px;
        font-size: 13px;
        color: rgba(250, 250, 250, 0.7);
      }
      .actions {
        margin-top: 16px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      button {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
        padding: 10px 12px;
        border-radius: 12px;
        cursor: pointer;
        font-size: 14px;
      }
      button:hover {
        background: rgba(255, 255, 255, 0.12);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>You’re offline</h1>
        <p>Prestige Drinks needs an internet connection to load this page.</p>
        <div class="actions">
          <button type="button" onclick="location.reload()">Try again</button>
        </div>
        <p class="hint">
          Tip: Check Wi‑Fi or mobile hotspot, then tap “Try again”.
        </p>
      </div>
    </div>
  </body>
</html>
